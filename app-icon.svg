<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#1a1f2e"/>

  <!--
    "The flick + waypoint" — v7
    Bold checkmark with rounded caps/joins (stroke-width 148 on 1024 canvas).
    Trailing dot at the rising terminus: the waypoint the check moves toward.
  -->

  <!-- Checkmark -->
  <path
    d="M 220 560 L 420 740 L 740 360"
    fill="none"
    stroke="#3b82f6"
    stroke-width="148"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Waypoint dot -->
  <circle cx="858" cy="240" r="64" fill="#3b82f6"/>
</svg>
