workflows:

  # ── Development — installs to a registered test device via ad-hoc signing ───
  ios-development:
    name: iOS Development
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.blutask.app
      node: 20
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync iOS
        script: npx cap sync ios
      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ── App Store / TestFlight ───────────────────────────────────────────────────
  ios-distribution:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: BluTask ASC    # must match the name in Codemagic → Team → Integrations
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.blutask.app
      node: 20
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync iOS
        script: npx cap sync ios
      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))
        ignore_failure: true
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
