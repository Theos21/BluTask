workflows:

  # ── Development — Codemagic automatic code signing ───────────────────────
  ios-development:
    name: iOS Development
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - iOS Signing
        - App Secrets        # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_TMDB_API_KEY
      ios_signing:
        distribution_type: development
        bundle_identifier: com.blutask.app
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm run build

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create
          keychain add-certificates
          xcode-project use-profiles \
            --custom-export-options '{"method":"development"}'

      - name: Build IPA
        script: |
          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_TARGET="--workspace $WORKSPACE"
          else
            BUILD_TARGET="--project $XCODE_PROJECT"
          fi

          xcode-project build-ipa \
            $BUILD_TARGET \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ── App Store — manual signing + automatic TestFlight upload via API ─────────
  # Hybrid: manual cert/profile (reliable) + App Store Connect API for upload
  ios-appstore:
    name: iOS App Store
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - iOS Manual Signing   # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
        - App Store Connect API # APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID
        - App Secrets          # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_TMDB_API_KEY
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm run build

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Set up manual code signing
        script: |
          keychain initialize

          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/dist_cert.p12
          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/blutask_appstore.mobileprovision

          # Install profile into the directory Xcode searches at archive time
          PROFILE_UUID=$(security cms -D -i /tmp/blutask_appstore.mobileprovision \
            | plutil -extract UUID raw -)
          echo "Installing provisioning profile UUID: $PROFILE_UUID"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/blutask_appstore.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          # Update Xcode project build settings to reference this profile
          xcode-project use-profiles \
            --profile /tmp/blutask_appstore.mobileprovision

      - name: Set build number
        script: |
          cd ios/App
          xcrun agvtool new-version -all 54

      - name: Build IPA
        script: |
          set -eo pipefail
          mkdir -p /tmp/xcodebuild_logs build/ios/ipa

          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning

          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_FLAG="-workspace $WORKSPACE"
            echo "Using workspace: $WORKSPACE"
          else
            BUILD_FLAG="-project $XCODE_PROJECT"
            echo "Using project: $XCODE_PROJECT"
          fi

          echo "=== Archiving ==="
          xcodebuild archive \
            $BUILD_FLAG \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/BluTask.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

          echo "=== Exporting IPA ==="
          xcodebuild -exportArchive \
            -archivePath /tmp/BluTask.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            2>&1 | tee /tmp/xcodebuild_logs/export.log

          echo "=== IPA files ==="
          find build/ios/ipa -type f

      - name: Upload to TestFlight
        script: |
          # Find IPA — xcodebuild sometimes nests it in a subdirectory
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found under build/ios/ipa"
            find build/ios/ipa -type f
            exit 1
          fi
          echo "Found IPA: $IPA_PATH"

          # Write .p8 key to the path altool expects
          mkdir -p ~/.private_keys
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

    artifacts:
      - build/ios/ipa/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
