workflows:

  # ── Development — certificate from encrypted environment variables ─────────
  ios-development:
    name: iOS Development
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== npm install (skip postinstall to avoid Tauri/Rust requirement) ==="
          npm install --legacy-peer-deps --ignore-scripts
          echo "=== vite binary check ==="
          ls node_modules/.bin/vite || echo "ERROR: vite not found in node_modules"
          echo "=== @capacitor/cli check ==="
          ls node_modules/@capacitor/cli/bin/capacitor || echo "MISSING: @capacitor/cli"

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== Running vite build ==="
          npm run build
          BUILD_EXIT=$?
          echo "=== Build exit code: $BUILD_EXIT ==="
          echo "=== Root directory after build ==="
          ls -la
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "ERROR: dist/ not created"
          exit $BUILD_EXIT

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== Working dir ==="
          pwd
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json
          echo "=== dist/ exists? ==="
          ls dist/ | head -5
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Install certificate and provisioning profile
        script: |
          # Decode certificate from env var
          echo "$CERTIFICATE_B64" | base64 --decode > /tmp/apple_dev.p12

          # Decode provisioning profile from env var
          echo "$PROVISIONING_PROFILE_B64" | base64 --decode > /tmp/blutask_dev.mobileprovision

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/blutask_dev.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

          # Install certificate into keychain
          keychain initialize
          keychain add-certificates --certificate /tmp/apple_dev.p12 \
            --certificate-password "$CERTIFICATE_PASSWORD"

      - name: Apply provisioning profile
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
