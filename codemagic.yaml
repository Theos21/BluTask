workflows:

  # ── Development — Codemagic automatic code signing ───────────────────────
  ios-development:
    name: iOS Development
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - iOS Signing
        - App Secrets        # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_TMDB_API_KEY
      ios_signing:
        distribution_type: development
        bundle_identifier: com.blutask.app
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm run build

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create
          keychain add-certificates
          xcode-project use-profiles \
            --custom-export-options '{"method":"development"}'

      - name: Build IPA
        script: |
          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_TARGET="--workspace $WORKSPACE"
          else
            BUILD_TARGET="--project $XCODE_PROJECT"
          fi

          xcode-project build-ipa \
            $BUILD_TARGET \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # ── App Store — manual signing + automatic TestFlight upload via API ─────────
  # Hybrid: manual cert/profile (reliable) + App Store Connect API for upload
  ios-appstore:
    name: iOS App Store
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: BluTask App Store Connect   # used only for publishing/upload
    environment:
      groups:
        - iOS Manual Signing   # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
        - App Secrets          # VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_TMDB_API_KEY
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm install --legacy-peer-deps --ignore-scripts

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          npm run build

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Set up manual code signing
        script: |
          keychain initialize

          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/dist_cert.p12
          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/blutask_appstore.mobileprovision
          xcode-project use-profiles \
            --profile /tmp/blutask_appstore.mobileprovision

      - name: Build IPA
        script: |
          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_TARGET="--workspace $WORKSPACE"
          else
            BUILD_TARGET="--project $XCODE_PROJECT"
          fi

          xcode-project build-ipa \
            $BUILD_TARGET \
            --scheme "$XCODE_SCHEME" \
            --custom-export-options '{"method":"app-store","signingStyle":"manual"}'

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false   # flip to true when ready for full review submission
