workflows:

  # ── Development — certificate from encrypted environment variables ─────────
  ios-development:
    name: iOS Development
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      groups:
        - iOS Signing
      node: 22
      xcode: latest
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.blutask.app
    scripts:
      - name: Install Capacitor CLI globally
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install 22 --no-progress
          nvm use 22
          node --version
          npm install -g @capacitor/cli@8.3.3
          cap --version

      - name: Install npm dependencies
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== npm install (skip postinstall to avoid Tauri/Rust requirement) ==="
          npm install --legacy-peer-deps --ignore-scripts
          echo "=== vite binary check ==="
          ls node_modules/.bin/vite || echo "ERROR: vite not found in node_modules"
          echo "=== @capacitor/cli check ==="
          ls node_modules/@capacitor/cli/bin/capacitor || echo "MISSING: @capacitor/cli"

      - name: Build web assets
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== Running vite build ==="
          npm run build
          BUILD_EXIT=$?
          echo "=== Build exit code: $BUILD_EXIT ==="
          echo "=== Root directory after build ==="
          ls -la
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "ERROR: dist/ not created"
          exit $BUILD_EXIT

      - name: Capacitor sync iOS
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "=== Working dir ==="
          pwd
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json
          echo "=== dist/ exists? ==="
          ls dist/ | head -5
          cap sync ios

      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Install certificate and provisioning profile
        script: |
          # --- Certificate ---
          echo "=== CERTIFICATE_B64 length: ${#CERTIFICATE_B64} ==="
          echo "$CERTIFICATE_B64" | base64 --decode > /tmp/apple_dev.p12
          echo "=== p12 size: $(wc -c < /tmp/apple_dev.p12) bytes ==="
          file /tmp/apple_dev.p12

          # --- Provisioning profile ---
          echo "=== PROVISIONING_PROFILE_B64 length: ${#PROVISIONING_PROFILE_B64} ==="
          echo "=== First 60 chars: ${PROVISIONING_PROFILE_B64:0:60} ==="
          echo "=== Last  60 chars: ${PROVISIONING_PROFILE_B64: -60} ==="

          # Decode — try ignoring unknown chars in case of line-break artefacts
          echo "$PROVISIONING_PROFILE_B64" | base64 --decode --ignore-garbage > /tmp/blutask_dev.mobileprovision 2>/dev/null \
            || echo "$PROVISIONING_PROFILE_B64" | base64 -d > /tmp/blutask_dev.mobileprovision
          echo "=== profile size: $(wc -c < /tmp/blutask_dev.mobileprovision) bytes ==="
          file /tmp/blutask_dev.mobileprovision

          # Decode profile XML for inspection
          PROFILE_XML=$(security cms -D -i /tmp/blutask_dev.mobileprovision)

          # UUID
          PROFILE_UUID=$(echo "$PROFILE_XML" \
            | grep -A1 '<key>UUID</key>' \
            | grep '<string>' \
            | sed 's/.*<string>\(.*\)<\/string>.*/\1/' \
            | tr -d '[:space:]')
          echo "=== Extracted UUID: '$PROFILE_UUID' ==="

          # Entitlements / capabilities inside the profile
          echo "=== Profile entitlements ==="
          echo "$PROFILE_XML" \
            | awk '/<key>Entitlements<\/key>/{found=1} found{print} /<\/dict>/{if(found){found=0}}' \
            | head -40

          # App ID name and expiry
          echo "=== App ID name ==="
          echo "$PROFILE_XML" | grep -A1 'AppIDName' | head -4
          echo "=== Expiry date ==="
          echo "$PROFILE_XML" | grep -A1 'ExpirationDate' | head -4

          # What the Xcode project declares it needs
          echo "=== Project entitlements file ==="
          cat ios/App/App/App.entitlements 2>/dev/null || echo "App.entitlements not found"

          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: UUID extraction failed — profile may be corrupt or env var truncated"
            exit 1
          fi

          # Install profile named by UUID (required for manual signing lookup)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/blutask_dev.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "=== Installed profile as ${PROFILE_UUID}.mobileprovision ==="

          # Persist UUID for the build step
          echo "$PROFILE_UUID" > /tmp/profile_uuid.txt

          # Create and unlock the signing keychain
          keychain initialize

          # Import certificate
          security import /tmp/apple_dev.p12 \
            -k ~/Library/Keychains/cms-signing.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A
          echo "=== security import exit: $? ==="

          # Allow codesign to access the keychain without prompts
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" \
            ~/Library/Keychains/cms-signing.keychain 2>/dev/null || true

          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

      - name: Build IPA
        script: |
          PROFILE_UUID=$(cat /tmp/profile_uuid.txt)
          echo "=== Using profile UUID: $PROFILE_UUID ==="

          mkdir -p build/ios/ipa

          # Use workspace generated by cap sync (preferred) or fall back to project
          WORKSPACE="ios/App/App.xcworkspace"
          if [ -d "$WORKSPACE" ]; then
            BUILD_TARGET="-workspace $WORKSPACE"
          else
            BUILD_TARGET="-project $XCODE_PROJECT"
          fi
          echo "=== Build target: $BUILD_TARGET ==="

          # Read exact identity name from keychain (avoids hardcoded string mismatches)
          SIGN_IDENTITY=$(security find-identity -v -p codesigning \
            | grep -o '"[^"]*"' | head -1 | tr -d '"')
          echo "=== Using signing identity: $SIGN_IDENTITY ==="

          xcodebuild archive \
            $BUILD_TARGET \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=9FXRBZ9H3L \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

          rm -f /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :method string development" /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string 9FXRBZ9H3L" /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.blutask.app string $PROFILE_UUID" /tmp/export_options.plist
          plutil -lint /tmp/export_options.plist && echo "=== plist valid ==="

          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
