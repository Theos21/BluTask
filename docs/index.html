<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluTask</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e293b;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2.5rem; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    a {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.85; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-ghost  { background: rgba(255,255,255,0.08); color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="logo">📋</div>
  <h1>BluTask</h1>
  <p>Your personal productivity app for tasks, school, and schedules.</p>
  <div class="links">
    <a href="support.html" class="btn-primary">Support</a>
    <a href="privacy.html" class="btn-ghost">Privacy Policy</a>
  </div>
</body>
</html>
